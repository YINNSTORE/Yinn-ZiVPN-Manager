name: Android Debug APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (retry loop)
        shell: bash
        run: |
          set -euo pipefail

          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref : $GITHUB_REF_NAME"

          # clean workspace biar gak konflik
          shopt -s dotglob
          rm -rf ./* ./.??* || true

          # retry fetch karena GitHub suka 500
          for i in {1..8}; do
            echo "Attempt $i/8: git init + fetch"
            git init .
            git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git" || true

            # fetch branch / ref_name (main)
            if git -c protocol.version=2 fetch --no-tags --prune --depth=1 origin "${GITHUB_REF_NAME}"; then
              git checkout -f FETCH_HEAD
              echo "Checkout OK"
              break
            fi

            echo "Fetch failed. Sleeping..."
            sleep 20
            rm -rf .git
            if [ "$i" -eq 8 ]; then
              echo "Checkout failed after 8 attempts"
              exit 1
            fi
          done

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yinn-zivpn-manager-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk