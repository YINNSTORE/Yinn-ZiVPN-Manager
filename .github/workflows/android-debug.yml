name: Android Debug APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # ✅ Build via Gradle (lebih reliable daripada flutter build apk di kasus lu)
      - name: Build Debug APK (Gradle)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace

      # ✅ Cari APK hasil build
      - name: Locate APK
        run: |
          echo "Searching APK..."
          find . -type f -name "*.apk" -print

          APK="$(find . -type f -path "*app/build/outputs/apk/debug/*.apk" | head -n 1)"
          if [ -z "$APK" ]; then
            APK="$(find . -type f -name "*.apk" | head -n 1)"
          fi

          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi

          echo "FOUND: $APK"
          mkdir -p artifacts
          cp "$APK" artifacts/yinn-zivpn-manager-debug.apk
          echo "APK_OUT=artifacts/yinn-zivpn-manager-debug.apk" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yinn-zivpn-manager-debug-apk
          path: ${{ env.APK_OUT }}