name: Android Debug APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK (verbose)
        run: flutter build apk --debug -v

      - name: Locate APK
        shell: bash
        run: |
          set -e
          echo "Searching for APK files..."
          find . -type f -name "*.apk" -print || true

          APK_PATH="$(find . -type f -name "*.apk" | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "NO_APK_FOUND=true" >> $GITHUB_ENV
            echo "No APK found. Listing build dirs for debugging:"
            ls -lah
            ls -lah build || true
            ls -lah build/app || true
            ls -lah build/app/outputs || true
            exit 1
          fi

          echo "Found APK: $APK_PATH"
          mkdir -p artifacts
          cp "$APK_PATH" artifacts/yinn-zivpn-manager-debug.apk
          echo "APK_OUT=artifacts/yinn-zivpn-manager-debug.apk" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yinn-zivpn-manager-debug-apk
          path: ${{ env.APK_OUT }}