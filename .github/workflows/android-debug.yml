name: Android Debug APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # ✅ flutter build kamu sering exit 1 karena "apk not found" walau BUILD SUCCESSFUL
      # jadi kita izinin step ini gagal tapi lanjut.
      - name: Build debug APK (allow fail)
        continue-on-error: true
        run: flutter build apk --debug -v

      - name: Locate APK (manual)
        shell: bash
        run: |
          set -e

          echo "Searching for APK files..."
          find . -type f -name "*.apk" -print || true

          # lokasi umum output (Flutter + Gradle)
          CANDIDATES=(
            "build/app/outputs/flutter-apk/app-debug.apk"
            "build/app/outputs/apk/debug/app-debug.apk"
            "android/app/build/outputs/apk/debug/app-debug.apk"
          )

          APK=""
          for p in "${CANDIDATES[@]}"; do
            if [ -f "$p" ]; then
              APK="$p"
              break
            fi
          done

          # kalau belum ketemu, cari dari mana aja
          if [ -z "$APK" ]; then
            APK="$(find . -type f -path "*outputs*apk*debug*.apk" | head -n 1 || true)"
          fi

          if [ -z "$APK" ]; then
            APK="$(find . -type f -name "*.apk" | head -n 1 || true)"
          fi

          if [ -z "$APK" ]; then
            echo "❌ APK not found anywhere."
            echo "Dumping useful dirs:"
            ls -lah || true
            ls -lah build || true
            ls -lah build/app || true
            ls -lah build/app/outputs || true
            ls -lah android || true
            ls -lah android/app || true
            ls -lah android/app/build || true
            ls -lah android/app/build/outputs || true
            exit 1
          fi

          echo "✅ Found APK: $APK"
          mkdir -p artifacts
          cp "$APK" artifacts/yinn-zivpn-manager-debug.apk
          echo "APK_OUT=artifacts/yinn-zivpn-manager-debug.apk" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yinn-zivpn-manager-debug-apk
          path: ${{ env.APK_OUT }}