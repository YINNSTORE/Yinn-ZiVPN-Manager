name: Android Debug APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # ✅ split-per-abi biar ukuran kecil (jadi beberapa APK: arm64, armeabi, x86_64)
      # ✅ continue-on-error karena kadang Flutter ngeluh "apk not found" walau build sukses
      - name: Build debug APK (split ABI, allow fail)
        continue-on-error: true
        run: flutter build apk --debug --split-per-abi -v

      - name: Locate APKs (manual)
        shell: bash
        run: |
          set -e

          echo "Searching for APK files..."
          find . -type f -name "*.apk" -print || true

          mkdir -p artifacts

          # Ambil semua debug APK yang kebentuk (split ABI)
          mapfile -t APK_LIST < <(find . -type f \( \
              -path "*build/app/outputs/flutter-apk/*debug*.apk" -o \
              -path "*build/app/outputs/apk/debug/*debug*.apk" -o \
              -path "*android/app/build/outputs/apk/debug/*debug*.apk" \
            \) 2>/dev/null)

          # fallback: ambil APK apa aja kalau pola di atas gak nemu
          if [ "${#APK_LIST[@]}" -eq 0 ]; then
            mapfile -t APK_LIST < <(find . -type f -name "*debug*.apk" 2>/dev/null)
          fi

          if [ "${#APK_LIST[@]}" -eq 0 ]; then
            echo "❌ No APK found anywhere."
            echo "Dumping useful dirs:"
            ls -lah || true
            ls -lah build || true
            ls -lah build/app || true
            ls -lah build/app/outputs || true
            ls -lah android || true
            ls -lah android/app || true
            ls -lah android/app/build || true
            ls -lah android/app/build/outputs || true
            exit 1
          fi

          echo "✅ Found ${#APK_LIST[@]} APK(s):"
          printf '%s\n' "${APK_LIST[@]}"

          # Copy semua APK ke artifacts/ biar gampang download
          for apk in "${APK_LIST[@]}"; do
            base="$(basename "$apk")"
            cp "$apk" "artifacts/$base"
          done

      - name: Upload artifact (all APKs)
        uses: actions/upload-artifact@v4
        with:
          name: yinn-zivpn-manager-debug-apk
          path: artifacts/*.apk