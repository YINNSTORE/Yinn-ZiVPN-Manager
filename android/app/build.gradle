plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.yinnstore.zivpnmanager"
    compileSdk 34

    defaultConfig {
        applicationId "com.yinnstore.zivpnmanager"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "0.0.1"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildTypes {
        release {
            // lu minta debug build aja, tapi ini tetep aman biar gradle gak rewel
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}